name: Update EPG XMLTV

on:
    schedule:
        - cron: '0 5 * * *' # Every day at 05:00 UTC
    workflow_dispatch:

jobs:
    update-epg:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v7.6.0

            - name: Generate EPG XMLTV
              run: uv run python epg_to_xmltv.py

            - name: Commit and push EPG XMLTV
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add epg.xml
                  git commit -m "Update EPG XMLTV [skip ci]" || echo "No changes to commit"
                  git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
                  git push
