name: Update EPG XMLTV

on:
    schedule:
        - cron: '0 5 * * *' # Every day at 05:00 UTC
    workflow_dispatch:

permissions:
    pages: write
    id-token: write

jobs:
    update-epg:
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v7.6.0

            - name: Generate EPG XMLTV
              run: uv run python epg_to_xmltv.py

            - name: Stage files for Pages
              run: |
                  mkdir _site
                  cp index.html .nojekyll epg.xml _site/

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: _site

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
